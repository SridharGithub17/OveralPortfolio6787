<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Portfolio Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1F3A5F">
<style>
  :root {
    --navy:#1F3A5F; --teal:#2E7D8F; --gold:#C9A227; --bg:#F4F6F9; --card:#FFFFFF;
    --ink:#1B1F23; --muted:#5C6B7A; --line:#E1E7EE;
    --green:#1E8E3E; --green-bg:#E6F4EA;
    --amber:#B06A00; --amber-bg:#FFF1D6;
    --red:#C5221F; --red-bg:#FCE8E6;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Segoe UI,Roboto,sans-serif;
    font-size:14px;line-height:1.4;overscroll-behavior-y:none}
  #root{min-height:100vh;display:flex;flex-direction:column}
  header{background:linear-gradient(135deg,var(--navy),var(--teal));color:#fff;
    padding:calc(var(--safe-top) + 14px) 18px 14px;box-shadow:0 2px 8px rgba(0,0,0,.08);
    position:sticky;top:0;z-index:10}
  header h1{margin:0 0 2px;font-size:18px;font-weight:600;letter-spacing:.2px}
  header p{margin:0;opacity:.85;font-size:12px}
  .layout{display:flex;flex:1}
  nav.side{width:220px;background:#fff;border-right:1px solid var(--line);padding:12px 0;display:none}
  nav.side button{display:block;width:100%;text-align:left;background:none;border:0;padding:11px 22px;
    cursor:pointer;color:var(--ink);font-size:14px;border-left:3px solid transparent}
  nav.side button:hover{background:var(--bg)}
  nav.side button.active{border-left-color:var(--gold);background:var(--bg);font-weight:600;color:var(--navy)}

  nav.bottom{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);
    display:flex;justify-content:space-around;padding:6px 4px calc(6px + var(--safe-bot));z-index:20;
    overflow-x:auto;-webkit-overflow-scrolling:touch}
  nav.bottom button{flex:0 0 auto;min-width:64px;background:none;border:0;padding:6px 8px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);font-size:10px;
    border-radius:8px;font-weight:500}
  nav.bottom button .icon{font-size:18px;line-height:1}
  nav.bottom button.active{color:var(--navy);background:var(--bg)}
  nav.bottom button.active .icon{transform:scale(1.05)}

  main{flex:1;padding:14px;padding-bottom:90px;overflow-x:hidden}
  h2{margin:0 0 12px;color:var(--navy);font-size:18px;font-weight:600}
  h3{margin:18px 0 8px;color:var(--navy);font-size:14px;font-weight:600}
  .grid{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));margin-bottom:12px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px}
  .kpi .label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .kpi .value{font-size:18px;font-weight:600;color:var(--navy);margin-top:3px;word-break:break-word}
  .kpi .sub{font-size:11px;color:var(--muted);margin-top:2px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:12px}
  .card h3:first-child{margin-top:0}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{background:var(--navy);color:#fff;text-align:left;padding:7px 8px;font-weight:600;font-size:11px;
    position:sticky;top:0}
  td{padding:6px 8px;border-bottom:1px solid var(--line);vertical-align:middle}
  tr:nth-child(even) td{background:#FAFBFD}
  .num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;white-space:nowrap}
  .pill-green{background:var(--green-bg);color:var(--green)}
  .pill-amber{background:var(--amber-bg);color:var(--amber)}
  .pill-red{background:var(--red-bg);color:var(--red)}
  .pill-gray{background:#EEF1F5;color:#5C6B7A}
  .badge-score{display:inline-block;min-width:34px;text-align:center;padding:3px 6px;border-radius:5px;
    font-weight:700;font-size:11px}
  button.primary{background:var(--navy);color:#fff;border:0;padding:10px 16px;border-radius:8px;
    cursor:pointer;font-size:13px;font-weight:500}
  button.primary:active{background:var(--teal)}
  button.ghost{background:transparent;color:var(--navy);border:1px solid var(--navy);padding:8px 12px;
    border-radius:7px;cursor:pointer;font-size:12px;font-weight:500}
  button.danger-link{background:none;border:0;color:var(--red);cursor:pointer;font-size:18px;padding:4px 8px}
  input,select,textarea{font:inherit;padding:8px 10px;border:1px solid var(--line);border-radius:7px;
    background:#fff;width:100%;-webkit-appearance:none;appearance:none}
  input[type=date]{min-height:36px}
  select{background:#fff url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%231F3A5F'><path d='M7 10l5 5 5-5z'/></svg>") no-repeat right 8px center;
    padding-right:28px}
  label{font-size:11px;color:var(--muted);display:block;margin-bottom:4px;font-weight:500}
  .row{display:grid;gap:10px;grid-template-columns:1fr 1fr;margin-bottom:10px}
  .row.cols-1{grid-template-columns:1fr}
  .row.cols-3{grid-template-columns:repeat(3,1fr)}
  .alerts-list > div{padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
  .alerts-list > div:last-child{border-bottom:0}
  .alerts-list .pill{margin-right:6px}
  .empty{padding:20px;text-align:center;color:var(--muted);font-style:italic;font-size:13px}
  .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
  .small{font-size:11px;color:var(--muted)}
  .property-row{padding:10px 0;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;
    align-items:center;gap:10px}
  .property-row:last-child{border-bottom:0}
  .property-row .info{flex:1;min-width:0}
  .property-row .info .name{font-weight:600;color:var(--navy);font-size:14px}
  .property-row .info .meta{font-size:11px;color:var(--muted);margin-top:2px}
  .property-row .stat{text-align:right;font-size:12px}
  .property-row .stat .v{font-weight:600;font-size:13px}
  details{border:1px solid var(--line);border-radius:8px;padding:10px;margin-bottom:8px;background:#fff}
  summary{cursor:pointer;color:var(--navy);font-weight:600;font-size:13px;list-style:none;
    display:flex;justify-content:space-between;align-items:center;gap:8px}
  summary::-webkit-details-marker{display:none}
  summary::after{content:"▾";color:var(--muted);transition:transform .2s}
  details[open] summary::after{transform:rotate(180deg)}
  details > div{margin-top:10px}

  .city-card{padding:12px;background:#fff;border:1px solid var(--line);border-radius:10px;margin-bottom:8px}
  .city-card .name{font-weight:600;color:var(--navy);font-size:14px;margin-bottom:4px}
  .city-card .stats{display:flex;flex-wrap:wrap;gap:10px 14px;font-size:11px;color:var(--muted);margin:6px 0}
  .city-card .stats b{color:var(--ink);font-weight:600}
  .checklist{margin:0;padding-left:20px}
  .checklist li{margin:4px 0;font-size:13px}

  .net-bar{display:flex;height:36px;border-radius:8px;overflow:hidden;margin:10px 0}
  .net-bar > div{display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;
    font-weight:600;padding:0 4px;overflow:hidden;white-space:nowrap}
  .alloc-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--line);
    font-size:13px}
  .alloc-row:last-child{border-bottom:0}
  .alloc-row .swatch{width:14px;height:14px;border-radius:3px;flex:0 0 auto}
  .alloc-row .name{flex:1}
  .alloc-row .val{font-weight:600;font-variant-numeric:tabular-nums}
  .alloc-row .pct{font-size:11px;color:var(--muted);width:48px;text-align:right;font-variant-numeric:tabular-nums}

  /* Sortable list / mobile-friendly tables */
  .stack-table{display:none}
  table.responsive .row-card{display:none}

  @media (max-width: 700px) {
    .row{grid-template-columns:1fr}
    .row.cols-3{grid-template-columns:1fr 1fr}
    table.responsive thead{display:none}
    table.responsive, table.responsive tbody, table.responsive tr, table.responsive td{display:block;width:100%}
    table.responsive tr{background:#fff !important;border:1px solid var(--line);border-radius:10px;
      padding:10px;margin-bottom:8px}
    table.responsive td{padding:4px 0;border:0;display:flex;justify-content:space-between;align-items:center;gap:8px}
    table.responsive td::before{content:attr(data-l);color:var(--muted);font-size:11px;text-transform:uppercase;
      letter-spacing:.4px;font-weight:500}
    table.responsive .num{text-align:right}
    table.responsive td input,table.responsive td select{width:auto;flex:1;max-width:60%}
  }
  @media (min-width: 900px) {
    nav.side{display:block}
    nav.bottom{display:none}
    main{padding:24px 32px;padding-bottom:24px}
    .grid{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
    .row{grid-template-columns:repeat(auto-fit,minmax(200px,1fr));display:flex;flex-wrap:wrap;align-items:flex-end}
    .row > div{flex:1 1 200px}
    header{padding:24px 32px}
    header h1{font-size:22px}
    h2{font-size:20px}
  }
</style>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useReducer, useCallback } = React;

// ---------- Storage keys / defaults ----------
const KEYS = {
  props:'rep_props_v1', maint:'rep_maint_v1', exp:'rep_exp_v1', ohio:'rep_ohio_v1',
  finances:'rep_finances_v1', settings:'rep_settings_v1'
};
const DEFAULT_SETTINGS = {
  marketRate30: 0.0668, marketRate15: 0.0595, refiCostPct: 0.025,
  targetCap: 0.085, targetCoC: 0.10, minEquityPct: 0.20,
  refiThreshold: 150, vacancyPct: 0.08, mgmtPct: 0.08,
  netWorthTargets: { realEstate: 0.40, equities: 0.30, cash: 0.10, retirement: 0.15, metals: 0.05 }
};
const DEFAULT_FINANCES = { savings: [], investments: [], retirement: [], metals: [] };

const load = (k,f) => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):f } catch { return f } };
const save = (k,v) => localStorage.setItem(k, JSON.stringify(v));

// ---------- Crypto / vault layer ----------
const VAULT_KEY = 'rep_vault_v1';
const MODE_KEY = 'rep_lock_mode_v1';   // 'vault' | 'plain'
const PBKDF2_ITER = 200000;

const b64enc = b => btoa(String.fromCharCode(...new Uint8Array(b)));
const b64dec = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2', salt, iterations:PBKDF2_ITER, hash:'SHA-256'},
    baseKey,
    {name:'AES-GCM', length:256},
    false, ['encrypt','decrypt']
  );
}
async function encryptObj(key, obj) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, new TextEncoder().encode(JSON.stringify(obj)));
  return {iv: b64enc(iv), ct: b64enc(ct)};
}
async function decryptObj(key, blob) {
  const iv = b64dec(blob.iv);
  const ct = b64dec(blob.ct);
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
  return JSON.parse(new TextDecoder().decode(pt));
}
async function saveVault(key, salt, data) {
  const blob = await encryptObj(key, data);
  localStorage.setItem(VAULT_KEY, JSON.stringify({salt: b64enc(salt), iv: blob.iv, ct: blob.ct, v: 1}));
}
async function unlockVault(password) {
  const raw = localStorage.getItem(VAULT_KEY);
  if(!raw) return null;
  const j = JSON.parse(raw);
  const salt = b64dec(j.salt);
  const key = await deriveKey(password, salt);
  const data = await decryptObj(key, {iv:j.iv, ct:j.ct});
  return {data, key, salt};
}
async function createVault(password, data) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const key = await deriveKey(password, salt);
  await saveVault(key, salt, data);
  return {key, salt};
}
const collectExistingPlain = () => ({
  props: load(KEYS.props,[]), maint: load(KEYS.maint,[]), exp: load(KEYS.exp,[]),
  ohio: load(KEYS.ohio,[]), finances: load(KEYS.finances,DEFAULT_FINANCES),
  settings: load(KEYS.settings,DEFAULT_SETTINGS)
});
const wipePlainKeys = () => Object.values(KEYS).forEach(k => localStorage.removeItem(k));

const fmtMoney = n => (n==null||isNaN(n)) ? '—' : (n<0?'($'+Math.abs(Math.round(n)).toLocaleString()+')':'$'+Math.round(n).toLocaleString());
const fmtMoney2 = n => (n==null||isNaN(n)) ? '—' : (n<0?'($'+Math.abs(n).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0})+')':'$'+n.toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0}));
const fmtPct = n => (n==null||isNaN(n)) ? '—' : (n*100).toFixed(2)+'%';
const fmtPct1 = n => (n==null||isNaN(n)) ? '—' : (n*100).toFixed(1)+'%';
const todayISO = () => new Date().toISOString().slice(0,10);
const daysBetween = (a,b) => Math.round((new Date(a)-new Date(b))/86400000);
const pmt = (rate, nper, pv) => rate===0 ? -pv/nper : -(pv*rate)/(1-Math.pow(1+rate,-nper));

// ---------- Calculations ----------
const calcProperty = (p, settings) => {
  const value = +p.value || 0, mort = +p.mortgage || 0;
  const equity = value - mort;
  const ltv = value > 0 ? mort/value : 0;
  const rent = +p.rent || 0;
  const eff = rent * (1 - settings.vacancyPct);
  const mgmt = rent * settings.mgmtPct;
  const pi = +p.pi || 0, taxIns = +p.taxIns || 0, hoa = +p.hoa || 0, opex = +p.opex || 0;
  const netCF = eff - pi - taxIns - hoa - opex - mgmt;
  const annualNOI = (eff - taxIns - hoa - opex - mgmt) * 12;
  const capRate = value > 0 ? annualNOI/value : 0;
  const currRate = +p.rate || 0;
  const newTerm = +p.newTerm || 30;
  const newPI = mort > 0 ? -pmt(settings.marketRate30/12, newTerm*12, mort) : 0;
  const moSavings = pi - newPI;
  const closingCost = mort * settings.refiCostPct;
  const breakEven = moSavings > 0 ? closingCost/moSavings : null;
  let refiDecision;
  if(currRate - settings.marketRate30 < 0.005) refiDecision = 'Skip - rate already low';
  else if(moSavings <= 0) refiDecision = 'Skip - no savings';
  else if(moSavings >= settings.refiThreshold && breakEven <= 24) refiDecision = 'REFI NOW';
  else if(moSavings >= settings.refiThreshold) refiDecision = 'Refi if staying long';
  else refiDecision = 'Below threshold';
  return { value, mort, equity, ltv, eff, mgmt, netCF, annualNOI, capRate,
    newPI, moSavings, closingCost, breakEven, refiDecision };
};

const calcOhio = (o, settings) => {
  const price = +o.price || 0, rent = +o.rent || 0;
  const tax = +o.tax || 0, ins = +o.ins || 0, opex = +o.opex || 0;
  const dpct = +o.dpct || 0.25;
  const rate = +o.rate || settings.marketRate30;
  const term = +o.term || 30;
  const grm = rent > 0 ? price/(rent*12) : null;
  const onePct = price > 0 ? rent/price : 0;
  const noi = rent*12*(1 - settings.vacancyPct) - tax - ins - opex;
  const capRate = price > 0 ? noi/price : 0;
  const downCash = price * dpct;
  const loan = price - downCash;
  const monthlyPI = loan > 0 ? -pmt(rate/12, term*12, loan) : 0;
  const annualCF = noi - monthlyPI*12;
  const coc = downCash > 0 ? annualCF/downCash : 0;
  const score = Math.round(
    Math.min(40, Math.max(0, capRate/settings.targetCap*40)) +
    Math.min(40, Math.max(0, coc/settings.targetCoC*40)) +
    Math.min(20, Math.max(0, onePct/0.01*20))
  );
  return { grm, onePct, noi, capRate, downCash, loan, monthlyPI, annualCF, coc, score };
};

const maintStatus = item => {
  if(!item.lastDate || !item.lifespan) return {label:'—', cls:'pill-gray', nextDue:null};
  const next = new Date(item.lastDate);
  next.setFullYear(next.getFullYear() + (+item.lifespan));
  const days = daysBetween(next, new Date());
  const nextDue = next.toISOString().slice(0,10);
  if(days < 0) return {label:'Overdue', cls:'pill-red', nextDue};
  if(days <= 60) return {label:'Due 60d', cls:'pill-amber', nextDue};
  return {label:'OK', cls:'pill-green', nextDue};
};

const refiPill = d => d==='REFI NOW'?'pill-green' : d==='Refi if staying long'?'pill-amber' :
  d==='Skip - rate already low'?'pill-gray' : 'pill-red';

// ---------- Tab definitions ----------
const TABS = [
  {id:'overview',  label:'Overview',  icon:'⌂'},
  {id:'properties',label:'Real Estate',icon:'🏠'},
  {id:'maint',     label:'Maint',     icon:'🔧'},
  {id:'expenses',  label:'Expenses',  icon:'💳'},
  {id:'refi',      label:'Refi',      icon:'📉'},
  {id:'ohio',      label:'Ohio',      icon:'🌎'},
  {id:'finances',  label:'Finances',  icon:'💼'},
  {id:'networth',  label:'Net Worth', icon:'📊'},
  {id:'settings',  label:'Settings',  icon:'⚙'}
];

// ---------- Header & Nav ----------
const Header = () => (
  <header>
    <h1>Portfolio Hub</h1>
    <p>Real estate · personal finances · net worth</p>
  </header>
);

const SideNav = ({tab, setTab}) => (
  <nav className="side">
    {TABS.map(t => (
      <button key={t.id} className={tab===t.id?'active':''} onClick={()=>setTab(t.id)}>{t.label}</button>
    ))}
  </nav>
);
const BottomNav = ({tab, setTab}) => (
  <nav className="bottom">
    {TABS.map(t => (
      <button key={t.id} className={tab===t.id?'active':''} onClick={()=>setTab(t.id)}>
        <span className="icon">{t.icon}</span>{t.label}
      </button>
    ))}
  </nav>
);

// ---------- Reusable bits ----------
const KPI = ({label, value, sub, valueColor}) => (
  <div className="kpi">
    <div className="label">{label}</div>
    <div className="value" style={valueColor?{color:valueColor}:null}>{value}</div>
    {sub && <div className="sub">{sub}</div>}
  </div>
);

const Field = ({label, value, onChange, type='text', step, options, style}) => (
  <div style={style}>
    <label>{label}</label>
    {options
      ? <select value={value||''} onChange={e=>onChange(e.target.value)}>
          {options.map(o => <option key={o} value={o}>{o}</option>)}
        </select>
      : <input type={type} step={step} value={value??''} onChange={e=>onChange(e.target.value)} />}
  </div>
);

// ---------- Overview Tab ----------
const Overview = ({props, maint, finances, settings, setTab}) => {
  const computed = useMemo(()=>props.map(p=>({...p, calc:calcProperty(p,settings)})),[props,settings]);
  const totalValue = computed.reduce((s,p)=>s+p.calc.value,0);
  const totalMort = computed.reduce((s,p)=>s+p.calc.mort,0);
  const totalEquity = totalValue - totalMort;
  const monthlyCF = computed.reduce((s,p)=>s+p.calc.netCF,0);
  const annualNOI = computed.reduce((s,p)=>s+p.calc.annualNOI,0);
  const portCap = totalValue > 0 ? annualNOI/totalValue : 0;
  const overdueMaint = maint.filter(m => maintStatus(m).label === 'Overdue').length;
  const refiCount = computed.filter(p => p.calc.refiDecision === 'REFI NOW').length;

  const finTotal = (finances.savings||[]).reduce((s,x)=>s+(+x.balance||0),0)
    + (finances.investments||[]).reduce((s,x)=>s+(+x.value||0),0)
    + (finances.retirement||[]).reduce((s,x)=>s+(+x.balance||0),0)
    + (finances.metals||[]).reduce((s,x)=>s+(+x.value||0),0);
  const netWorth = totalEquity + finTotal;

  const alerts = [];
  maint.forEach(m => {
    const st = maintStatus(m);
    if(st.label === 'Overdue') alerts.push({pill:'pill-red',label:'Overdue',text:`${m.property||'—'} · ${m.item} (was due ${st.nextDue})`});
    else if(st.label === 'Due 60d') alerts.push({pill:'pill-amber',label:'Due soon',text:`${m.property||'—'} · ${m.item} (${st.nextDue})`});
  });
  computed.forEach(p => {
    if(p.calc.refiDecision === 'REFI NOW')
      alerts.push({pill:'pill-green',label:'Refi Now',text:`${p.nickname||p.address} · save ${fmtMoney(p.calc.moSavings)}/mo, break-even ${p.calc.breakEven.toFixed(0)} mo`});
    if(p.calc.netCF < 0)
      alerts.push({pill:'pill-red',label:'Neg cash flow',text:`${p.nickname||p.address} · ${fmtMoney(p.calc.netCF)}/mo`});
  });

  return (
    <div>
      <h2>Overview</h2>
      <div className="grid">
        <KPI label="Net Worth" value={fmtMoney(netWorth)} sub="Real estate equity + liquid" />

const CATS = ['Mortgage','Property Tax','Insurance','Utilities','Repairs','Capital Improvement','Mgmt Fee','HOA','Travel','Legal/Accounting','Other'];

const Expenses = ({exp, setExp, props}) => {
  const [filterProp, setFP] = useState('');
  const [filterCat, setFC] = useState('');
  const update = (i,k,v) => { const n=[...exp]; n[i]={...n[i],[k]:v}; setExp(n); };
  const add = () => setExp([...exp, {date:todayISO(),property:'',category:'Mortgage',amount:0}]);
  const del = i => { const n=[...exp]; n.splice(i,1); setExp(n); };
  const propNames = [...new Set(props.map(p=>p.nickname||p.address).filter(Boolean))];

  const filtered = exp.filter(e =>
    (!filterProp || e.property===filterProp) && (!filterCat || e.category===filterCat));
  const today = new Date();
  const sumYTD = filtered.filter(e=>e.date && new Date(e.date).getFullYear()===today.getFullYear()).reduce((s,e)=>s+(+e.amount||0),0);
  const sumMTD = filtered.filter(e=>{const d=new Date(e.date); return d.getFullYear()===today.getFullYear()&&d.getMonth()===today.getMonth();}).reduce((s,e)=>s+(+e.amount||0),0);
  const sum12 = filtered.filter(e=>{const d=new Date(e.date); return (today-d)/86400000 <= 365;}).reduce((s,e)=>s+(+e.amount||0),0);

  const catTotals = {};
  filtered.filter(e=>e.date && new Date(e.date).getFullYear()===today.getFullYear()).forEach(e=>{
    const c = e.category||'Other'; catTotals[c] = (catTotals[c]||0)+(+e.amount||0);
  });
  const total = Object.values(catTotals).reduce((s,v)=>s+v,0);

  const sorted = [...filtered].map((e,i)=>({...e,_orig:exp.indexOf(e)})).sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  return (
    <div>
      <h2>Expense Tracker</h2>
      <div className="row cols-3">
        <select value={filterProp} onChange={e=>setFP(e.target.value)}>
          <option value="">All properties</option>{propNames.map(p=><option key={p}>{p}</option>)}
        </select>
        <select value={filterCat} onChange={e=>setFC(e.target.value)}>
          <option value="">All categories</option>{CATS.map(c=><option key={c}>{c}</option>)}
        </select>
        <button className="primary" onClick={add}>+ Add expense</button>
      </div>
      <div className="grid">
        <KPI label="MTD" value={fmtMoney(sumMTD)} />
        <KPI label="YTD" value={fmtMoney(sumYTD)} />
        <KPI label="Last 12 mo" value={fmtMoney(sum12)} />
        <KPI label="Entries" value={filtered.length} />
      </div>
      {filtered.length === 0
        ? <div className="card empty">No expenses match. Add an entry to start tracking.</div>
        : <div className="card" style={{padding:8}}>
            <table className="responsive">
              <thead><tr>
                <th>Date</th><th>Property</th><th>Category</th><th>Vendor</th><th>Description</th><th>Amount</th><th></th>
              </tr></thead>
              <tbody>{sorted.map(e=>(
                <tr key={e._orig}>
                  <td data-l="Date"><input type="date" value={e.date||''} onChange={ev=>update(e._orig,'date',ev.target.value)} /></td>
                  <td data-l="Property"><input list="exp-prop-opts" value={e.property||''} onChange={ev=>update(e._orig,'property',ev.target.value)} /></td>
                  <td data-l="Category">
                    <select value={e.category||'Other'} onChange={ev=>update(e._orig,'category',ev.target.value)}>
                      {CATS.map(c=><option key={c}>{c}</option>)}
                    </select>
                  </td>
                  <td data-l="Vendor"><input value={e.vendor||''} onChange={ev=>update(e._orig,'vendor',ev.target.value)} /></td>
                  <td data-l="Description"><input value={e.description||''} onChange={ev=>update(e._orig,'description',ev.target.value)} /></td>
                  <td data-l="Amount" className="num"><input type="number" value={e.amount||''} onChange={ev=>update(e._orig,'amount',ev.target.value)} /></td>
                  <td><button className="danger-link" onClick={()=>del(e._orig)}>×</button></td>
                </tr>
              ))}</tbody>
            </table>
            <datalist id="exp-prop-opts">{propNames.map(p=>(<option key={p} value={p}/>))}</datalist>
          </div>}

      {total > 0 && (
        <div className="card">
          <h3>YTD by category</h3>
          {Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).map(([c,v])=>(
            <div className="alloc-row" key={c}>
              <div className="name">{c}</div>
              <div className="val">{fmtMoney(v)}</div>
              <div className="pct">{(v/total*100).toFixed(1)}%</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

const Finances = ({finances, setFinances}) => {
  const upd = (cat) => ({
    add: () => {
      const blanks = {
        savings: {institution:'',type:'Savings',balance:0,apy:0},
        investments: {holding:'',type:'Stock',account:'',shares:0,value:0,costBasis:0},
        retirement: {account:'',type:'401(k)',provider:'',balance:0,ytdContrib:0},
        metals: {type:'Gold',form:'Coin',quantity:0,value:0}
      };
      setFinances({...finances, [cat]:[...(finances[cat]||[]), blanks[cat]]});
    },
    update: (i,k,v) => {
      const arr = [...(finances[cat]||[])]; arr[i] = {...arr[i], [k]:v};
      setFinances({...finances, [cat]:arr});
    },
    del: i => {
      const arr = [...(finances[cat]||[])]; arr.splice(i,1);
      setFinances({...finances, [cat]:arr});
    }
  });

  const sav = upd('savings'), inv = upd('investments'), ret = upd('retirement'), met = upd('metals');
  const sumS = (finances.savings||[]).reduce((s,x)=>s+(+x.balance||0),0);
  const sumI = (finances.investments||[]).reduce((s,x)=>s+(+x.value||0),0);
  const sumR = (finances.retirement||[]).reduce((s,x)=>s+(+x.balance||0),0);
  const sumM = (finances.metals||[]).reduce((s,x)=>s+(+x.value||0),0);
  const total = sumS + sumI + sumR + sumM;

  return (
    <div>
      <h2>Personal Finances</h2>

        <KPI label="Investments" value={fmtMoney(sumI)} />

      <Section

          {key:'apy',label:'APY',type:'number',step:'0.0001',num:true},
          {key:'notes',label:'Notes'}
        ]} />

      <Section
        title="Investments (Stocks / ETFs / Bonds)"
        items={finances.investments||[]}
        addItem={inv.add} updateItem={inv.update} deleteItem={inv.del}
        totalLabel="Market value"
        columns={[
          {key:'holding',label:'Holding / Ticker'},
          {key:'type',label:'Type',options:INVEST_TYPES},
          {key:'account',label:'Account'},
          {key:'shares',label:'Shares',type:'number',step:'0.001',num:true},
          {key:'value',label:'Mkt Value',type:'number',num:true},
          {key:'costBasis',label:'Cost Basis',type:'number',num:true}
        ]} />

      <Section
        title="Retirement Accounts"
        items={finances.retirement||[]}
        addItem={ret.add} updateItem={ret.update} deleteItem={ret.del}
        totalLabel="Total balance" totalKey="balance"

const NetWorth = ({props, finances, settings}) => {
  const computed = props.map(p=>({...p, calc:calcProperty(p,settings)}));
  const reEquity = computed.reduce((s,p)=>s+p.calc.equity,0);
  const reValue = computed.reduce((s,p)=>s+p.calc.value,0);
  const reMort = computed.reduce((s,p)=>s+p.calc.mort,0);
  const annualCF = computed.reduce((s,p)=>s+p.calc.netCF,0)*12;
  const sumS = (finances.savings||[]).reduce((s,x)=>s+(+x.balance||0),0);
  const sumI = (finances.investments||[]).reduce((s,x)=>s+(+x.value||0),0);
  const sumR = (finances.retirement||[]).reduce((s,x)=>s+(+x.balance||0),0);
  const sumM = (finances.metals||[]).reduce((s,x)=>s+(+x.value||0),0);

  const totalAssets = reValue + sumS + sumI + sumR + sumM;
  const totalLiabilities = reMort;
  const netWorth = totalAssets - totalLiabilities;
  const liquid = sumS + sumI + sumM;
  const illiquid = reEquity + sumR;

  const allocations = [
    {name:'Real Estate equity', value:reEquity, color:'#1F3A5F', target:settings.netWorthTargets.realEstate},
    {name:'Equities (stocks/funds)', value:sumI, color:'#2E7D8F', target:settings.netWorthTargets.equities},
    {name:'Cash & Savings', value:sumS, color:'#5BA4B8', target:settings.netWorthTargets.cash},
    {name:'Retirement', value:sumR, color:'#C9A227', target:settings.netWorthTargets.retirement},
    {name:'Precious Metals', value:sumM, color:'#8B6914', target:settings.netWorthTargets.metals}
  ];
  const allocTotal = allocations.reduce((s,a)=>s+a.value,0);

  return (
    <div>
      <h2>Net Worth</h2>
      <div className="grid">
        <KPI label="Net Worth" value={fmtMoney(netWorth)} />
        <KPI label="Total Assets" value={fmtMoney(totalAssets)} />
        <KPI label="Total Liabilities" value={fmtMoney(totalLiabilities)} valueColor="var(--red)" />
        <KPI label="Liquid Assets" value={fmtMoney(liquid)} sub={`${allocTotal?(liquid/allocTotal*100).toFixed(0):0}% of allocation`} />
        <KPI label="Real Estate Cash Flow" value={fmtMoney(annualCF)} sub="Annual, net of all expenses" />
      </div>

      <div className="card">
        <h3>Allocation</h3>
        {allocTotal > 0 && (
          <div className="net-bar">
            {allocations.filter(a=>a.value>0).map((a,i)=>(
              <div key={i} style={{background:a.color, flex:a.value, minWidth:a.value/allocTotal>0.06?'auto':'0'}}>
                {a.value/allocTotal>0.08 ? (a.value/allocTotal*100).toFixed(0)+'%' : ''}
              </div>
            ))}
          </div>
        )}
        {allocations.map(a => (
          <div className="alloc-row" key={a.name}>
            <span className="swatch" style={{background:a.color}}></span>
            <div className="name">{a.name}</div>
            <div className="val">{fmtMoney(a.value)}</div>
            <div className="pct">{allocTotal?(a.value/allocTotal*100).toFixed(1):'0.0'}%</div>
          </div>
        ))}
      </div>

      <div className="card">
        <h3>Allocation vs target</h3>
        <p className="small" style={{marginTop:0}}>Targets are set on the Settings tab. Variances tell you what's over/under-weight.</p>
        <table className="responsive">
          <thead><tr><th>Bucket</th><th>Actual</th><th>Target</th><th>Variance</th><th>Action</th></tr></thead>
          <tbody>{allocations.map(a => {
            const actual = allocTotal?a.value/allocTotal:0;
            const variance = actual - a.target;
            const action = Math.abs(variance) < 0.02 ? 'On target' :
              variance > 0 ? 'Overweight — trim' : 'Underweight — add';
            const cls = Math.abs(variance) < 0.02 ? 'pill-green' :
              variance > 0 ? 'pill-amber' : 'pill-amber';
            return (
              <tr key={a.name}>
                <td data-l="Bucket">{a.name}</td>
                <td data-l="Actual" className="num">{fmtPct1(actual)}</td>
                <td data-l="Target" className="num">{fmtPct1(a.target)}</td>
                <td data-l="Variance" className="num" style={{color:variance<0?'var(--red)':variance>0?'var(--amber)':'var(--green)'}}>
                  {variance>=0?'+':''}{(variance*100).toFixed(1)}%
                </td>
                <td data-l="Action"><span className={`pill ${cls}`}>{action}</span></td>
              </tr>
            );
          })}</tbody>
        </table>
      </div>

      <div className="card">
        <h3>Balance sheet</h3>
        <table>
          <tbody>
            <tr><td colSpan="2" style={{background:'#FAFBFD',fontWeight:600,color:'var(--navy)'}}>ASSETS</td></tr>
            <tr><td>Real estate (market value)</td><td className="num">{fmtMoney(reValue)}</td></tr>

  );

const LockScreen = ({mode, onUnlock, onSetup, onSkip, onReset, error, busy}) => {
  const [pwd, setPwd] = useState('');
  const [pwd2, setPwd2] = useState('');
  const [view, setView] = useState(mode === 'setup' ? 'choose' : 'unlock');

  const submit = e => {
    e && e.preventDefault();
    if(busy) return;
    if(view === 'unlock'){ onUnlock(pwd); }
    else if(view === 'create'){
      if(pwd.length < 6){ alert('Password must be at least 6 characters.'); return; }
      if(pwd !== pwd2){ alert('Passwords do not match.'); return; }
      onSetup(pwd);
    }
  };

  return (
    <div style={lockStyle.wrap}>
      <div style={lockStyle.card}>
        <div style={lockStyle.icon}>🔒</div>
        <h1 style={lockStyle.title}>Portfolio Hub</h1>

        {view === 'choose' && (
          <div>
            <p style={lockStyle.sub}>Protect your data with a password.<br/>Your numbers stay encrypted in this browser.</p>
            <button style={lockStyle.btn} onClick={()=>setView('create')}>Set up a password</button>
            <button style={lockStyle.btnGhost} onClick={onSkip}>Skip — use without protection</button>
            <p style={{...lockStyle.sub,marginTop:18,fontSize:11}}>
              Strong: password derives an AES-256 key (PBKDF2, 200k iter). Data is encrypted at rest.
              If you forget the password, data is unrecoverable.
            </p>
          </div>
        )}

        {view === 'create' && (
          <form onSubmit={submit}>
            <p style={lockStyle.sub}>Choose a password (6+ characters). Write it down somewhere safe — there's no recovery.</p>
            {error && <div style={lockStyle.err}>{error}</div>}
            <div style={lockStyle.group}>
              <label style={{fontSize:11,color:'#5C6B7A',display:'block',marginBottom:4}}>Password</label>
              <input type="password" autoFocus value={pwd} onChange={e=>setPwd(e.target.value)}
                style={{width:'100%',padding:'10px 12px',border:'1px solid #E1E7EE',borderRadius:7,fontSize:15}} />
            </div>
            <div style={lockStyle.group}>
              <label style={{fontSize:11,color:'#5C6B7A',display:'block',marginBottom:4}}>Confirm password</label>
              <input type="password" value={pwd2} onChange={e=>setPwd2(e.target.value)}
                style={{width:'100%',padding:'10px 12px',border:'1px solid #E1E7EE',borderRadius:7,fontSize:15}} />
            </div>
            <button style={lockStyle.btn} type="submit" disabled={busy}>{busy?'Encrypting…':'Set password & continue'}</button>
            <button style={lockStyle.btnGhost} type="button" onClick={()=>setView('choose')}>Back</button>
          </form>
        )}

        {view === 'unlock' && (
          <form onSubmit={submit}>
            <p style={lockStyle.sub}>Enter your password to unlock</p>
            {error && <div style={lockStyle.err}>{error}</div>}
            <div style={lockStyle.group}>
              <input type="password" autoFocus value={pwd} onChange={e=>setPwd(e.target.value)}
                placeholder="Password"
                style={{width:'100%',padding:'12px',border:'1px solid #E1E7EE',borderRadius:7,fontSize:15}} />
            </div>
            <button style={lockStyle.btn} type="submit" disabled={busy||!pwd}>{busy?'Unlocking…':'Unlock'}</button>
            <button style={lockStyle.link} type="button" onClick={onReset}>Forgot password — start over (erases all data)</button>
          </form>
        )}
      </div>
    </div>
  );
};

// ---------- App ----------
const App = () => {
  // Lock state
  const [mode, setMode] = useState('loading'); // loading | setup | locked | unlocked | plain
  const [cryptoKey, setCryptoKey] = useState(null);
  const [salt, setSalt] = useState(null);
  const [unlockErr, setUnlockErr] = useState('');
  const [unlockBusy, setUnlockBusy] = useState(false);

  const [tab, setTab] = useState('overview');
  const [props, setProps] = useState([]);
  const [maint, setMaint] = useState([]);
  const [exp, setExp] = useState([]);
  const [ohio, setOhio] = useState([]);
  const [finances, setFinances] = useState(DEFAULT_FINANCES);
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);

  // Save status: 'saved' | 'unsaved' | 'saving' | 'error'
  const [saveStatus, setSaveStatus] = useState('saved');

  // First-time mode determination
  useEffect(() => {
    const hasVault = !!localStorage.getItem(VAULT_KEY);
    const lockMode = localStorage.getItem(MODE_KEY);
    if(hasVault){ setMode('locked'); return; }
    if(lockMode === 'plain'){
      const d = collectExistingPlain();
      setProps(d.props||[]); setMaint(d.maint||[]); setExp(d.exp||[]); setOhio(d.ohio||[]);
      setFinances({...DEFAULT_FINANCES, ...(d.finances||{})});
      setSettings({...DEFAULT_SETTINGS, ...(d.settings||{}), netWorthTargets:{...DEFAULT_SETTINGS.netWorthTargets, ...((d.settings||{}).netWorthTargets||{})}});
      setMode('plain'); return;
    }
    setMode('setup');
  }, []);

  // Detect changes → mark unsaved, then debounced auto-save
  useEffect(() => {
    if(mode !== 'plain' && mode !== 'unlocked') return;
    setSaveStatus('unsaved');
  }, [props, maint, exp, ohio, finances, settings]);

  // Debounced auto-save when unsaved
  useEffect(() => {
    if(saveStatus !== 'unsaved') return;
    const t = setTimeout(() => { doSave(); }, 1200);
    return () => clearTimeout(t);
  }, [saveStatus, props, maint, exp, ohio, finances, settings, mode, cryptoKey, salt]);

  const doSave = async () => {
    if(mode === 'plain'){
      try {
        setSaveStatus('saving');
        save(KEYS.props, props); save(KEYS.maint, maint); save(KEYS.exp, exp);
        save(KEYS.ohio, ohio); save(KEYS.finances, finances); save(KEYS.settings, settings);
        setSaveStatus('saved');
      } catch(e){ setSaveStatus('error'); }
    } else if(mode === 'unlocked' && cryptoKey && salt){
      try {
        setSaveStatus('saving');
        await saveVault(cryptoKey, salt, {props, maint, exp, ohio, finances, settings});
        setSaveStatus('saved');
      } catch(e){ console.error('vault save failed', e); setSaveStatus('error'); }
    }
  };
  const handleSaveNow = () => { doSave(); };

  // Lock handlers
  const handleUnlock = async (password) => {
    setUnlockErr(''); setUnlockBusy(true);
    try {
      const r = await unlockVault(password);
      const d = r.data || {};
      setProps(d.props||[]); setMaint(d.maint||[]); setExp(d.exp||[]); setOhio(d.ohio||[]);
      setFinances({...DEFAULT_FINANCES, ...(d.finances||{})});
      setSettings({...DEFAULT_SETTINGS, ...(d.settings||{}), netWorthTargets:{...DEFAULT_SETTINGS.netWorthTargets, ...((d.settings||{}).netWorthTargets||{})}});
      setCryptoKey(r.key); setSalt(r.salt);
      setMode('unlocked'); setTab('overview');
    } catch(e){ setUnlockErr('Wrong password — try again.'); }
    finally { setUnlockBusy(false); }
  };
  const handleSetup = async (password) => {
    setUnlockBusy(true);
    try {
      // If existing plain data, migrate it into the vault
      const existing = collectExistingPlain();
      const data = {
        props: existing.props||[], maint: existing.maint||[], exp: existing.exp||[],
        ohio: existing.ohio||[], finances: {...DEFAULT_FINANCES, ...(existing.finances||{})},
        settings: {...DEFAULT_SETTINGS, ...(existing.settings||{}), netWorthTargets:{...DEFAULT_SETTINGS.netWorthTargets, ...((existing.settings||{}).netWorthTargets||{})}}
      };
      const {key, salt: newSalt} = await createVault(password, data);
      wipePlainKeys();
      localStorage.setItem(MODE_KEY, 'vault');
      setProps(data.props); setMaint(data.maint); setExp(data.exp); setOhio(data.ohio);
      setFinances(data.finances); setSettings(data.settings);
      setCryptoKey(key); setSalt(newSalt);
      setMode('unlocked');
    } catch(e){ alert('Setup failed: '+e.message); }
    finally { setUnlockBusy(false); }
  };
  const handleSkip = () => {
    const d = collectExistingPlain();
    setProps(d.props||[]); setMaint(d.maint||[]); setExp(d.exp||[]); setOhio(d.ohio||[]);
    setFinances({...DEFAULT_FINANCES, ...(d.finances||{})});
    setSettings({...DEFAULT_SETTINGS, ...(d.settings||{}), netWorthTargets:{...DEFAULT_SETTINGS.netWorthTargets, ...((d.settings||{}).netWorthTargets||{})}});
    localStorage.setItem(MODE_KEY, 'plain');
    setMode('plain');
  };
  const handleLock = () => {
    setProps([]); setMaint([]); setExp([]); setOhio([]);
    setFinances(DEFAULT_FINANCES); setSettings(DEFAULT_SETTINGS);
    setCryptoKey(null); setSalt(null); setUnlockErr('');
    setMode('locked');
  };
  const handleEnableEncryption = async () => {
    const password = prompt('Set a password (6+ chars). Write it down — no recovery.');
    if(!password) return;
    if(password.length < 6){ alert('Too short.'); return; }
    const confirm2 = prompt('Re-enter password to confirm.');
    if(password !== confirm2){ alert('Passwords do not match.'); return; }
    try {
      const data = {props, maint, exp, ohio, finances, settings};
      const {key, salt: newSalt} = await createVault(password, data);
      wipePlainKeys();
      localStorage.setItem(MODE_KEY, 'vault');
      setCryptoKey(key); setSalt(newSalt);
      setMode('unlocked');
      alert('Password protection enabled.');
    } catch(e){ alert('Failed: '+e.message); }
  };
  const handleResetVault = () => {
    if(confirm('Erase ALL data and the vault? This cannot be undone.')){
      Object.values(KEYS).forEach(k => localStorage.removeItem(k));
      localStorage.removeItem(VAULT_KEY); localStorage.removeItem(MODE_KEY);
      location.reload();
    }
  };


  const exportData = () => {
    const blob = new Blob([JSON.stringify({props,maint,exp,ohio,finances,settings},null,2)],{type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'portfolio_'+todayISO()+'.json';
    a.click();
  };
  const importData = ev => {
    const f = ev.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const d = JSON.parse(r.result);
        if(d.props) setProps(d.props);
        if(d.maint) setMaint(d.maint);
        if(d.exp) setExp(d.exp);
        if(d.ohio) setOhio(d.ohio);
        if(d.finances) setFinances({...DEFAULT_FINANCES, ...d.finances});
        if(d.settings) setSettings({...DEFAULT_SETTINGS, ...d.settings, netWorthTargets:{...DEFAULT_SETTINGS.netWorthTargets, ...(d.settings.netWorthTargets||{})}});
        alert('Imported.');
      } catch(e){ alert('Import failed: '+e.message); }
    };
    r.readAsText(f);
    ev.target.value = '';
  };

  const exportXLSX = () => {
    const wb = XLSX.utils.book_new();
    const propRows = props.map(p => ({...p, ...calcProperty(p,settings)}));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(propRows), 'Properties');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(maint), 'Maintenance');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(exp), 'Expenses');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(ohio), 'Ohio Prospects');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(finances.savings||[]), 'Savings');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(finances.investments||[]), 'Investments');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(finances.retirement||[]), 'Retirement');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(finances.metals||[]), 'Metals');
    const settingsRows = Object.entries(settings).filter(([k,v])=>typeof v !== 'object').map(([k,v])=>({key:k,value:v}));
    Object.entries(settings.netWorthTargets||{}).forEach(([k,v])=>settingsRows.push({key:'target_'+k, value:v}));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(settingsRows), 'Settings');
    XLSX.writeFile(wb, 'Portfolio_Hub_'+todayISO()+'.xlsx');
  };

  const importXLSX = ev => {
    const f = ev.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = e => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, {type:'array'});
        const sheet = name => wb.Sheets[name] ? XLSX.utils.sheet_to_json(wb.Sheets[name]) : null;
        const stripCalc = p => {
          const calcKeys = ['value','mort','equity','ltv','eff','mgmt','netCF','annualNOI','capRate','newPI','moSavings','closingCost','breakEven','refiDecision'];
          const out = {...p};
          // 'value' is a real input; don't strip it. Strip only the derived ones.
          ['equity','ltv','eff','mgmt','netCF','annualNOI','capRate','newPI','moSavings','closingCost','breakEven','refiDecision','mort'].forEach(k=>delete out[k]);
          return out;
        };
        const p = sheet('Properties'); if(p) setProps(p.map(stripCalc));
        const m = sheet('Maintenance'); if(m) setMaint(m);
        const ex = sheet('Expenses'); if(ex) setExp(ex);
        const o = sheet('Ohio Prospects'); if(o) setOhio(o);
        const sav = sheet('Savings'), inv = sheet('Investments'), ret = sheet('Retirement'), met = sheet('Metals');
        if(sav||inv||ret||met) setFinances({savings:sav||[], investments:inv||[], retirement:ret||[], metals:met||[]});
        const st = sheet('Settings');
        if(st){
          const nw = {...DEFAULT_SETTINGS, netWorthTargets:{...DEFAULT_SETTINGS.netWorthTargets}};
          st.forEach(row => {
            if(String(row.key||'').startsWith('target_')) nw.netWorthTargets[row.key.slice(7)] = +row.value;
            else if(row.key in nw) nw[row.key] = +row.value;
          });
          setSettings(nw);
        }
        alert('Imported from Excel.');
      } catch(e){ alert('Import failed: '+e.message); }
    };
    r.readAsArrayBuffer(f);
    ev.target.value = '';
  };

  const loadSamples = () => {
    setProps([
      {nickname:'Sample 1', address:'123 Maple St', city:'Columbus', state:'OH', type:'SFR',
       value:235000, mortgage:142000, rate:0.0625, yrsLeft:25, pi:1135, taxIns:425, hoa:0, rent:1850, opex:250},
      {nickname:'Sample 2', address:'456 Oak Ave', city:'Cleveland', state:'OH', type:'SFR',
       value:165000, mortgage:78000, rate:0.0425, yrsLeft:22, pi:525, taxIns:320, hoa:0, rent:1450, opex:180},
      {nickname:'Sample 3', address:'789 Pine Ln', city:'Cincinnati', state:'OH', type:'Duplex',
       value:275000, mortgage:205000, rate:0.075, yrsLeft:28, pi:1430, taxIns:510, hoa:0, rent:2400, opex:320}
    ]);
    setMaint([
      {property:'Sample 1', item:'Roof', lastDate:'2010-08-01', lifespan:25, cost:8500},
      {property:'Sample 1', item:'HVAC', lastDate:'2018-05-15', lifespan:15, cost:6500, vendor:'Comfort Pros'},
      {property:'Sample 2', item:'Furnace', lastDate:'2014-11-30', lifespan:20, cost:3200},
      {property:'Sample 3', item:'Exterior Paint', lastDate:'2019-06-01', lifespan:8, cost:4500}
    ]);
    setExp([
      {date:'2026-04-01', property:'Sample 1', category:'Mortgage', vendor:'Chase', description:'April mortgage', amount:1135},
      {date:'2026-04-01', property:'Sample 2', category:'Mortgage', vendor:'Wells Fargo', description:'April mortgage', amount:525},
      {date:'2026-04-05', property:'Sample 1', category:'Insurance', vendor:'State Farm', description:'Q2 premium', amount:220},
      {date:'2026-04-12', property:'Sample 2', category:'Repairs', vendor:'Quick Plumbing', description:'Leaky faucet', amount:145},
      {date:'2026-04-22', property:'Sample 3', category:'Property Tax', vendor:'Cuyahoga Cty', description:'1H tax', amount:1850}
    ]);
    setOhio([
      {status:'Watching', address:'100 Hot Lead Way', city:'Cleveland', price:95000, rent:1250, tax:1900, ins:850, opex:2200, dpct:0.25, rate:0.075, term:30},
      {status:'Touring', address:'200 Equity Ln', city:'Dayton', price:119000, rent:1400, tax:1850, ins:950, opex:2400, dpct:0.20, rate:0.075, term:30}
    ]);
    setFinances({
      savings:[
        {institution:'Chase', type:'Checking', balance:8500, apy:0, notes:'Operating'},
        {institution:'Marcus', type:'High-Yield Savings', balance:42000, apy:0.045, notes:'Emergency fund'},
      ],
      investments:[
        {holding:'VTI', type:'ETF', account:'Fidelity Brokerage', shares:120, value:32400, costBasis:24000},
        {holding:'AAPL', type:'Stock', account:'Fidelity Brokerage', shares:50, value:9500, costBasis:6500},
      ],
      retirement:[
        {account:'401(k) – current employer', type:'401(k)', provider:'Empower', balance:185000, ytdContrib:9200},
        {account:'Roth IRA', type:'Roth IRA', provider:'Vanguard', balance:62000, ytdContrib:3500}
      ],
      metals:[
        {type:'Gold', form:'Coin', quantity:5, value:11500, notes:'1 oz Eagles'},
        {type:'Silver', form:'Bar', quantity:200, value:6800, notes:'10 oz bars'}
      ]
    });
    alert('Sample data loaded.');
  };

  const resetAll = () => {
    if(confirm('This will wipe all data on this device. Continue?')){
      Object.values(KEYS).forEach(k=>localStorage.removeItem(k));
      location.reload();
    }
  };

  return (
    <div id="root-inner" style={{display:'flex',flexDirection:'column',minHeight:'100vh'}}>
      <Header />
      <div className="layout">
        <SideNav tab={tab} setTab={setTab} />
        <main>
          {tab==='overview'   && <Overview props={props} maint={maint} finances={finances} settings={settings} setTab={setTab} />}
          {tab==='properties' && <Properties props={props} setProps={setProps} settings={settings} />}
          {tab==='maint'      && <Maint maint={maint} setMaint={setMaint} props={props} />}
          {tab==='expenses'   && <Expenses exp={exp} setExp={setExp} props={props} />}
          {tab==='refi'       && <Refi props={props} settings={settings} />}
          {tab==='ohio'       && <Ohio ohio={ohio} setOhio={setOhio} settings={settings} />}
          {tab==='finances'   && <Finances finances={finances} setFinances={setFinances} />}
          {tab==='networth'   && <NetWorth props={props} finances={finances} settings={settings} />}
          {tab==='settings'   && <SettingsTab settings={settings} setSettings={setSettings}
            exportData={exportData} importData={importData}
            exportXLSX={exportXLSX} importXLSX={importXLSX}
            loadSamples={loadSamples} resetAll={resetAll} />}
        </main>
      </div>
      <BottomNav tab={tab} setTab={setTab} />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
